server {
    listen 5173;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the FastAPI container — no CORS, no hardcoded localhost
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;   # pipeline runs can be slow
    }

    # Hashed static assets — safe to cache forever.
    # (Checked before the SPA fallback so it wins for real files.)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router — all other routes fall back to index.html.
    # index.html must NEVER be cached, or a browser keeps pointing at an old
    # JS bundle after a deploy (routes like /carte then 404 to a blank page).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
